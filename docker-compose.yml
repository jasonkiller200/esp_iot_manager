version: "3.9"

services:
  app:
    image: python:3.12-slim
    container_name: esp_iot_manager_app
    working_dir: /app
    command: bash -lc "pip install --no-cache-dir -r requirements.txt && python run.py"
    volumes:
      - ./:/app
      - ./firmware:/app/firmware
      - ./instance:/app/instance
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: 0
    ports:
      - "5000:5000"
    depends_on:
      - mqtt
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: esp_iot_manager_mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
